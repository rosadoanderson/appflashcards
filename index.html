<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AnKing Dashboard Pro v15</title>
<link rel="stylesheet" href="styles.css?v=15">
</head>
<body>

<div id="loader" class="loader">
  <div class="card">
    <h1>AnKing Dashboard Pro</h1>
    <p id="status">Inicializando...</p>
    <div class="bar"><div id="progress"></div></div>
  </div>
</div>

<div id="app" class="hidden">
  <div class="card-container">
    <div id="question" class="card-text"></div>
    <div id="answer" class="card-text hidden"></div>
  </div>

  <div class="buttons">
    <button onclick="showAnswer()">Mostrar resposta</button>
    <button onclick="nextCard()">Próximo</button>
  </div>
</div>

<script src="app.js?v=15"></script>
</body>
</html>
